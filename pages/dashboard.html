<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - AI智能去背景</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    
    .header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 20px;
    }
    
    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo { font-size: 20px; font-weight: 700; }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
    }
    
    .user-name { font-size: 16px; font-weight: 600; }
    .user-email { font-size: 12px; opacity: 0.8; }
    
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .card-title .icon { font-size: 24px; }
    
    /* 配额卡片 */
    .quota-card {
      grid-column: span 2;
    }
    
    .quota-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .quota-badge.free { background: #d1fae5; color: #059669; }
    .quota-badge.pro { background: #fef3c7; color: #d97706; }
    
    .quota-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    
    .quota-item {
      text-align: center;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    
    .quota-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
    }
    
    .quota-label {
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }
    
    .quota-progress {
      margin-top: 20px;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }
    
    .quota-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 4px;
      transition: width 0.3s;
    }
    
    /* 会员升级卡片 */
    .upgrade-card {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      text-align: center;
    }
    
    .upgrade-card .card-title { color: white; }
    
    .upgrade-price {
      font-size: 48px;
      font-weight: 800;
    }
    
    .upgrade-price span { font-size: 16px; }
    
    .upgrade-features {
      text-align: left;
      margin: 20px 0;
      list-style: none;
    }
    
    .upgrade-features li {
      padding: 8px 0;
      font-size: 14px;
    }
    
    .upgrade-features li::before {
      content: '✓ ';
      margin-right: 8px;
    }
    
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: white;
      color: var(--primary);
    }
    
    .btn-outline {
      background: transparent;
      border: 2px solid white;
      color: white;
    }
    
    /* 历史记录 */
    .history-card { grid-column: span 2; }
    
    .history-list {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .history-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }
    
    .history-item:last-child { border-bottom: none; }
    
    .history-thumb {
      width: 60px;
      height: 60px;
      background: #f5f5f5;
      border-radius: 8px;
      object-fit: cover;
    }
    
    .history-info { flex: 1; }
    .history-name { font-weight: 600; color: #333; }
    .history-time { font-size: 12px; color: #999; margin-top: 4px; }
    .history-credits { color: var(--primary); font-weight: 600; }
    
    /* 设置表单 */
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .toggle {
      position: relative;
      width: 48px;
      height: 24px;
    }
    
    .toggle input { opacity: 0; width: 0; height: 0; }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 24px;
      transition: 0.3s;
    }
    
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    
    .toggle input:checked + .toggle-slider { background: var(--primary); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(24px); }
    
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }
    
    .setting-row:last-child { border-bottom: none; }
    
    /* 导航tabs */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e5e7eb;
    }
    
    .tab {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
    }
    
    .tab:hover { color: var(--primary); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    @media (max-width: 768px) {
      .quota-card, .history-card { grid-column: span 1; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div class="logo">🎨 AI去背景</div>
      <div class="user-info">
        <div>
          <div class="user-name" id="userName">加载中...</div>
          <div class="user-email" id="userEmail"></div>
        </div>
        <img class="avatar" id="userAvatar" src="" alt="avatar">
      </div>
    </div>
  </div>
  
  <div class="container">
    <!-- 导航 -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('quota')">📊 配额中心</div>
      <div class="tab" onclick="switchTab('history')">📝 使用记录</div>
      <div class="tab" onclick="switchTab('settings')">⚙️ 设置</div>
    </div>
    
    <!-- 配额中心 -->
    <div id="quota" class="tab-content active">
      <div class="grid">
        <div class="card quota-card">
          <div class="card-title">
            <span class="icon">📊</span>
            我的配额
            <span class="quota-badge free" id="planBadge">免费版</span>
          </div>
          
          <div class="quota-stats">
            <div class="quota-item">
              <div class="quota-value" id="dailyRemaining">-</div>
              <div class="quota-label">今日剩余</div>
            </div>
            <div class="quota-item">
              <div class="quota-value" id="monthlyRemaining">-</div>
              <div class="quota-label">本月剩余</div>
            </div>
          </div>
          
          <div class="quota-progress">
            <div class="quota-progress-bar" id="quotaProgress" style="width: 0%"></div>
          </div>
          <p style="font-size: 12px; color: #999; margin-top: 8px;">
            已使用: <span id="totalUsed">0</span> 次
          </p>
        </div>
        
        <div class="card upgrade-card">
          <div class="card-title">
            <span class="icon">⭐</span>
            升级 Pro
          </div>
          <div class="upgrade-price">¥29<span>/月</span></div>
          <ul class="upgrade-features">
            <li>200次/月处理额度</li>
            <li>原画级输出质量</li>
            <li>30天使用记录</li>
            <li>批量处理支持</li>
            <li>优先队列</li>
          </ul>
          <a href="/pricing" class="btn btn-primary">立即升级</a>
        </div>
      </div>
    </div>
    
    <!-- 使用记录 -->
    <div id="history" class="tab-content">
      <div class="card history-card">
        <div class="card-title">
          <span class="icon">📝</span>
          最近使用记录
        </div>
        
        <div class="history-list" id="historyList">
          <div class="history-item">
            <div class="history-info">
              <div class="history-name">暂无记录</div>
              <div class="history-time">开始您的第一次去背景吧</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 设置 -->
    <div id="settings" class="tab-content">
      <div class="grid">
        <div class="card">
          <div class="card-title">
            <span class="icon">👤</span>
            个人设置
          </div>
          
          <div class="form-group">
            <label class="form-label">显示名称</label>
            <input type="text" class="form-input" id="inputName" placeholder="您的昵称">
          </div>
          
          <button class="btn btn-primary" onclick="saveProfile()">保存设置</button>
        </div>
        
        <div class="card">
          <div class="card-title">
            <span class="icon">⚙️</span>
            偏好设置
          </div>
          
          <div class="setting-row">
            <div>
              <div style="font-weight: 500;">深色模式</div>
              <div style="font-size: 12px; color: #999;">开启后界面将变为深色</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="toggleDark">
              <span class="toggle-slider"></span>
            </label>
          </div>
          
          <div class="setting-row">
            <div>
              <div style="font-weight: 500;">自动下载</div>
              <div style="font-size: 12px; color: #999;">处理完成后自动下载图片</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="toggleAutoDownload" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          
          <div class="setting-row">
            <div>
              <div style="font-weight: 500;">默认输出格式</div>
            </div>
            <select class="form-input" style="width: auto;" id="selectFormat">
              <option value="png">PNG</option>
              <option value="jpg">JPG</option>
              <option value="webp">WebP</option>
            </select>
          </div>
        </div>
        
        <div class="card" style="grid-column: span 2;">
          <div class="card-title">
            <span class="icon">🔔</span>
            通知设置
          </div>
          
          <div class="setting-row">
            <div>
              <div style="font-weight: 500;">邮件通知</div>
              <div style="font-size: 12px; color: #999;">接收配额不足和会员到期提醒</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="toggleEmail" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // 获取用户信息
    async function loadUserData() {
      try {
        const resp = await fetch('/api/user/profile', {
          headers: { 'X-User-Id': getCookie('userId') }
        });
        const data = await resp.json();
        
        if (data.authenticated) {
          document.getElementById('userName').textContent = data.user.name;
          document.getElementById('userEmail').textContent = data.user.email;
          document.getElementById('userAvatar').src = data.user.avatar || '/default-avatar.png';
          document.getElementById('inputName').value = data.user.name;
          
          if (data.user.isPro) {
            document.getElementById('planBadge').textContent = 'Pro';
            document.getElementById('planBadge').className = 'quota-badge pro';
          }
        }
      } catch (e) {
        console.error('加载用户数据失败:', e);
      }
      
      loadQuota();
    }
    
    // 获取配额信息
    async function loadQuota() {
      try {
        const resp = await fetch('/api/user/quota', {
          headers: { 'X-User-Id': getCookie('userId') }
        });
        const data = await resp.json();
        
        if (data.authenticated) {
          document.getElementById('dailyRemaining').textContent = data.daily.remaining;
          document.getElementById('monthlyRemaining').textContent = data.monthly.remaining;
          document.getElementById('totalUsed').textContent = data.monthly.used;
          
          const used = data.monthly.used;
          const limit = data.monthly.limit === '∞' ? 200 : data.monthly.limit;
          const pct = Math.min((used / limit) * 100, 100);
          document.getElementById('quotaProgress').style.width = pct + '%';
        }
      } catch (e) {
        console.error('加载配额失败:', e);
      }
    }
    
    // Tab切换
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab).classList.add('active');
    }
    
    // 保存设置
    async function saveProfile() {
      const name = document.getElementById('inputName').value;
      // 实际项目中这里会调用保存接口
      alert('设置已保存 (演示)');
    }
    
    // 获取Cookie
    function getCookie(name) {
      const value = '; ' + document.cookie;
      const parts = value.split('; ' + name + '=');
      return parts.length > 1 ? parts.pop().split(';').shift() : '';
    }
    
    loadUserData();
  </script>
</body>
</html>
