<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - AI Background Remover</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --success: #10b981;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 20px;
    }
    .header-content {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 20px; font-weight: 700; }
    .nav-links { display: flex; gap: 15px; }
    .nav-link {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      background: rgba(255,255,255,0.2);
      transition: background 0.2s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.3); }
    .user-info { display: flex; align-items: center; gap: 15px; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); }
    .user-name { font-weight: 600; }
    .user-email { font-size: 12px; opacity: 0.8; }
    .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
    .credits-banner {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      text-align: center;
    }
    .credit-value { font-size: 56px; font-weight: 800; color: var(--primary); }
    .credit-label { font-size: 16px; color: #666; margin-top: 10px; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .card-title .icon { font-size: 24px; }
    .plans-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .plan-item { border: 2px solid #eee; border-radius: 12px; padding: 25px 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .plan-item:hover { border-color: var(--primary); transform: translateY(-2px); }
    .plan-name { font-weight: 600; color: #333; margin-bottom: 10px; }
    .plan-credits { font-size: 28px; font-weight: 700; color: var(--primary); }
    .plan-price { font-size: 16px; color: #666; margin-top: 5px; }
    .plan-per { font-size: 12px; color: #999; margin-top: 5px; }
    .btn {
      display: inline-block;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }
    .btn:hover { transform: scale(1.02); }
    .info-text { color: #666; line-height: 1.6; }
    @media (max-width: 768px) {
      .plans-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div class="logo">AI Background Remover</div>
      <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/pricing" class="nav-link">Pricing</a>
      </div>
      <div class="user-info">
        <div>
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-email" id="userEmail"></div>
        </div>
        <img class="avatar" id="userAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23999'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="">
      </div>
    </div>
  </div>
  
  <div class="container">
    <div class="credits-banner">
      <div class="credit-value" id="creditsValue">-</div>
      <div class="credit-label">Credits Remaining</div>
      <p style="color: #999; margin-top: 10px; font-size: 13px;">Credits never expire</p>
    </div>
    
    <div class="card">
      <div class="card-title"><span class="icon">💳</span> Buy Credits</div>
      <div class="plans-grid" id="plansGrid"></div>
      <p style="color: #999; font-size: 13px; margin-top: 15px; text-align: center;">
        All credits are permanent and never expire
      </p>
    </div>
    
    <div class="card">
      <div class="card-title"><span class="icon">📋</span> Account Info</div>
      <p class="info-text">
        <strong>Email:</strong> <span id="userEmail2">-</span><br>
        <strong>Credits Used:</strong> <span id="totalUsed">0</span><br>
        <strong>Member Since:</strong> <span id="memberSince">-</span>
      </p>
    </div>
  </div>
  
  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDzwv4aGmRzBA-t4tOsMF6JAwXmUAzJQ2g",
      authDomain: "image-background-remove-cdc6d.firebaseapp.com",
      projectId: "image-background-remove-cdc6d",
      storageBucket: "image-background-remove-cdc6d.firebasestorage.app",
      messagingSenderId: "155957397056",
      appId: "1:155957397056:web:a227c9487b32a1c16ac1a5"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    
    // Credit packs
    const creditPacks = {
      starter: { credits: 10, price: 3.00, name: 'Starter' },
      popular: { credits: 30, price: 6.00, name: 'Popular' },
      power: { credits: 100, price: 15.00, name: 'Power' }
    };
    
    async function loadUserData() {
      // Wait for Firebase auth state
      return new Promise((resolve) => {
        auth.onAuthStateChanged(async (user) => {
          if (!user) {
            // Not logged in, redirect to home
            window.location.href = '/';
            resolve();
            return;
          }
          
          // Update user info
          document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
          document.getElementById('userEmail').textContent = user.email;
          document.getElementById('userEmail2').textContent = user.email;
          
          if (user.photoURL) {
            document.getElementById('userAvatar').src = user.photoURL;
          }
          
          // Get quota from API
          try {
            const resp = await fetch('/api/quota?userId=' + user.uid);
            const quota = await resp.json();
            document.getElementById('creditsValue').textContent = quota.remaining || 0;
          } catch (e) {
            console.error('Failed to load quota:', e);
            document.getElementById('creditsValue').textContent = '-';
          }
          
          // Load plans
          loadPlans();
          resolve();
        });
      });
    }
    
    function loadPlans() {
      const grid = document.getElementById('plansGrid');
      Object.entries(creditPacks).forEach(([id, pack]) => {
        const pricePer = (pack.price / pack.credits).toFixed(2);
        grid.innerHTML += `
          <div class="plan-item" onclick="selectPack('${id}')">
            <div class="plan-name">${pack.name}</div>
            <div class="plan-credits">${pack.credits}</div>
            <div class="plan-price">$${pack.price.toFixed(2)}</div>
            <div class="plan-per">$${pricePer}/credit</div>
          </div>
        `;
      });
    }
    
    function selectPack(packId) {
      window.location.href = '/pricing?pack=' + packId;
    }
    
    loadUserData();
  </script>
</body>
</html>
