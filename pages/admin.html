<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - AI Background Remover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
    }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header .subtitle { font-size: 14px; opacity: 0.8; }
    
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .stat-value { font-size: 36px; font-weight: 800; color: #667eea; }
    .stat-label { font-size: 14px; color: #666; margin-top: 5px; }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }
    .card-title { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 20px; }
    
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 600; color: #333; }
    tr:hover { background: #f8f9fa; }
    
    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .refresh-btn:hover { background: #5a71d6; }
    .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .loading { text-align: center; color: #999; padding: 40px; }
    .error { text-align: center; color: #dc3545; padding: 20px; background: #fee2e2; border-radius: 8px; margin-bottom: 20px; }
    
    .payment-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .payment-item:last-child { border-bottom: none; }
    .payment-info { font-size: 14px; }
    .payment-amount { font-weight: 600; color: #059669; font-size: 16px; }
    .payment-date { font-size: 12px; color: #999; }
    
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-active { background: #d1fae5; color: #059669; }
    .badge-free { background: #fef3c7; color: #d97706; }
    
    .no-data { text-align: center; color: #999; padding: 40px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Admin Dashboard</h1>
    <div class="subtitle">AI Background Remover - Sales & User Statistics</div>
  </div>
  
  <div class="container">
    <div id="errorMessage" class="error" style="display: none;"></div>
    
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalUsers">-</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalCredits">-</div>
        <div class="stat-label">Credits Sold</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalRevenue">$0</div>
        <div class="stat-label">Total Revenue</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="guestTrials">-</div>
        <div class="stat-label">Guest Trials</div>
      </div>
    </div>
    
    <!-- Users Table -->
    <div class="card">
      <div class="header-row">
        <div class="card-title">Recent Users</div>
        <button class="refresh-btn" id="refreshBtn" onclick="loadStats()">🔄 Refresh</button>
      </div>
      <div id="usersLoading" class="loading">Loading...</div>
      <table id="usersTable" style="display: none;">
        <thead>
          <tr>
            <th>Email</th>
            <th>Credits</th>
            <th>Purchased</th>
            <th>Used</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
    
    <!-- Recent Payments -->
    <div class="card">
      <div class="card-title">Recent Payments</div>
      <div id="paymentsLoading" class="loading">Loading...</div>
      <div id="paymentsList"></div>
    </div>
  </div>
  
  <script>
    async function loadStats() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      
      const errorEl = document.getElementById('errorMessage');
      errorEl.style.display = 'none';
      
      try {
        const resp = await fetch('/api/admin-stats');
        
        if (!resp.ok) {
          throw new Error(`API error: ${resp.status}`);
        }
        
        const data = await resp.json();
        
        // Update stats
        document.getElementById('totalUsers').textContent = data.totalUsers || 0;
        document.getElementById('totalCredits').textContent = data.totalCreditsSold || 0;
        document.getElementById('totalRevenue').textContent = '$' + ((data.totalRevenue || 0).toFixed(2));
        document.getElementById('guestTrials').textContent = data.guestTrials || 0;
        
        // Render users table
        const usersBody = document.getElementById('usersBody');
        const usersTable = document.getElementById('usersTable');
        const usersLoading = document.getElementById('usersLoading');
        
        if (data.users && data.users.length > 0) {
          usersLoading.style.display = 'none';
          usersTable.style.display = 'table';
          usersBody.innerHTML = data.users.map(user => `
            <tr>
              <td>${user.email || '-'}</td>
              <td><strong>${user.credits}</strong></td>
              <td>${user.total_purchased || 0}</td>
              <td>${user.total_used || 0}</td>
              <td>${user.created_at ? new Date(user.created_at).toLocaleDateString() : '-'}</td>
            </tr>
          `).join('');
        } else {
          usersLoading.style.display = 'none';
          usersTable.style.display = 'none';
          usersBody.innerHTML = '<tr><td colspan="5" class="no-data">No users yet</td></tr>';
        }
        
        // Render payments
        const paymentsList = document.getElementById('paymentsList');
        const paymentsLoading = document.getElementById('paymentsLoading');
        
        if (data.payments && data.payments.length > 0) {
          paymentsLoading.style.display = 'none';
          paymentsList.innerHTML = data.payments.map(p => `
            <div class="payment-item">
              <div class="payment-info">
                <div><strong>${p.pack_id}</strong> - ${p.credits} credits</div>
                <div class="payment-date">${p.email || 'Unknown'} • ${new Date(p.created_at).toLocaleString()}</div>
              </div>
              <div class="payment-amount">$${p.amount.toFixed(2)}</div>
            </div>
          `).join('');
        } else {
          paymentsLoading.style.display = 'none';
          paymentsList.innerHTML = '<div class="no-data">No payments yet</div>';
        }
        
      } catch (error) {
        console.error('Failed to load stats:', error);
        errorEl.textContent = 'Failed to load data: ' + error.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '🔄 Refresh';
      }
    }
    
    // Load on page load
    loadStats();
  </script>
</body>
</html>
