<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - AI Background Remover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
    }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header .subtitle { font-size: 14px; opacity: 0.8; }
    
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    
    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .stat-value { font-size: 36px; font-weight: 800; color: #667eea; }
    .stat-label { font-size: 14px; color: #666; margin-top: 5px; }
    
    /* Table */
    .card {
      background: white;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .card-title { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 20px; }
    
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 600; color: #333; }
    tr:hover { background: #f8f9fa; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-active { background: #d1fae5; color: #059669; }
    .badge-guest { background: #fef3c7; color: #d97706; }
    
    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .refresh-btn:hover { background: #5a71d6; }
    
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    /* Payment History */
    .payment-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .payment-item:last-child { border-bottom: none; }
    .payment-info { font-size: 14px; }
    .payment-amount { font-weight: 600; color: #059669; }
    .payment-date { font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Admin Dashboard</h1>
    <div class="subtitle">AI Background Remover - Sales & User Statistics</div>
  </div>
  
  <div class="container">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalUsers">-</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalCredits">-</div>
        <div class="stat-label">Credits Sold</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalRevenue">$0</div>
        <div class="stat-label">Total Revenue</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="guestTrials">-</div>
        <div class="stat-label">Guest Trials</div>
      </div>
    </div>
    
    <!-- Users Table -->
    <div class="card">
      <div class="header-row">
        <div class="card-title">Recent Users</div>
        <button class="refresh-btn" onclick="loadStats()">🔄 Refresh</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>User ID</th>
            <th>Email</th>
            <th>Credits</th>
            <th>Purchased</th>
            <th>Used</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="6" style="text-align:center; color:#999;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    
    <div style="height: 20px;"></div>
    
    <!-- Recent Payments -->
    <div class="card">
      <div class="card-title">Recent Payments</div>
      <div id="paymentsList">
        <p style="text-align:center; color:#999;">No payments recorded yet</p>
      </div>
    </div>
  </div>
  
  <script>
    // Demo stats - in production these would come from an API
    const demoStats = {
      totalUsers: 12,
      totalCreditsSold: 156,
      totalRevenue: 234,
      guestTrials: 45,
      users: [
        { id: 'user_001', email: 'john@example.com', credits: 27, purchased: 30, used: 3, status: 'active' },
        { id: 'user_002', email: 'jane@example.com', credits: 0, purchased: 100, used: 100, status: 'active' },
        { id: 'user_003', email: 'bob@example.com', credits: 3, purchased: 3, used: 0, status: 'active' },
      ],
      payments: [
        { date: '2026-03-27', pack: 'Popular', credits: 30, amount: '$6' },
        { date: '2026-03-26', pack: 'Power', credits: 100, amount: '$15' },
        { date: '2026-03-25', pack: 'Starter', credits: 10, amount: '$3' },
      ]
    };
    
    function loadStats() {
      // In production, fetch from API
      // For demo, use localStorage if available
      const stored = localStorage.getItem('adminStats');
      const stats = stored ? JSON.parse(stored) : demoStats;
      
      document.getElementById('totalUsers').textContent = stats.totalUsers || 0;
      document.getElementById('totalCredits').textContent = stats.totalCreditsSold || 0;
      document.getElementById('totalRevenue').textContent = '$' + (stats.totalRevenue || 0);
      document.getElementById('guestTrials').textContent = stats.guestTrials || 0;
      
      // Render users table
      const tbody = document.getElementById('usersTable');
      if (stats.users && stats.users.length > 0) {
        tbody.innerHTML = stats.users.map(user => `
          <tr>
            <td><code style="font-size:12px">${user.id.substring(0, 12)}...</code></td>
            <td>${user.email || '-'}</td>
            <td><strong>${user.credits}</strong></td>
            <td>${user.purchased}</td>
            <td>${user.used}</td>
            <td><span class="badge ${user.credits > 0 ? 'badge-active' : 'badge-guest'}">${user.credits > 0 ? 'Active' : 'Free'}</span></td>
          </tr>
        `).join('');
      }
      
      // Render payments
      const paymentsList = document.getElementById('paymentsList');
      if (stats.payments && stats.payments.length > 0) {
        paymentsList.innerHTML = stats.payments.map(p => `
          <div class="payment-item">
            <div class="payment-info">
              <div><strong>${p.pack}</strong> - ${p.credits} credits</div>
              <div class="payment-date">${p.date}</div>
            </div>
            <div class="payment-amount">${p.amount}</div>
          </div>
        `).join('');
      }
    }
    
    // Load on page load
    loadStats();
  </script>
</body>
</html>
